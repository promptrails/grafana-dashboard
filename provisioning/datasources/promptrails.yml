apiVersion: 1

datasources:
  - name: PromptRails
    uid: promptrails
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: https://api.promptrails.ai
    isDefault: true
    jsonData:
      allowedHosts:
        - "https://api.promptrails.ai"
      httpHeaderName1: "X-API-Key"
    secureJsonData:
      httpHeaderValue1: "${PROMPTRAILS_API_KEY}"
    editable: true
