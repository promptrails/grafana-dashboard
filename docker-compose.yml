version: "3.8"

services:
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3333:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - PROMPTRAILS_API_KEY=${PROMPTRAILS_API_KEY}
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  grafana-setup:
    image: curlimages/curl:8.11.1
    depends_on:
      - grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_URL=http://grafana:3000
      - PROMPTRAILS_API_KEY=${PROMPTRAILS_API_KEY}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        API_KEY="$${PROMPTRAILS_API_KEY:?Set PROMPTRAILS_API_KEY in .env}"
        GF_PASS="$${GF_SECURITY_ADMIN_PASSWORD:-admin}"
        GF_URL="$${GF_URL:-http://grafana:3000}"

        until curl -sf -u "admin:$${GF_PASS}" "$${GF_URL}/api/health" > /dev/null 2>&1; do
          sleep 2
        done

        PAYLOAD=$$(cat <<EOF
        {
          "name": "PromptRails",
          "uid": "promptrails",
          "type": "yesoreyeram-infinity-datasource",
          "access": "proxy",
          "url": "https://api.promptrails.ai",
          "isDefault": true,
          "jsonData": {
            "allowedHosts": ["https://api.promptrails.ai"],
            "httpHeaderName1": "X-API-Key"
          },
          "secureJsonData": {
            "httpHeaderValue1": "$${API_KEY}"
          }
        }
        EOF
        )

        if curl -sf -u "admin:$${GF_PASS}" "$${GF_URL}/api/datasources/uid/promptrails" > /dev/null 2>&1; then
          curl -sf -X PUT -u "admin:$${GF_PASS}" \
            -H "Content-Type: application/json" \
            "$${GF_URL}/api/datasources/uid/promptrails" \
            -d "$${PAYLOAD}" > /dev/null
        else
          curl -sf -X POST -u "admin:$${GF_PASS}" \
            -H "Content-Type: application/json" \
            "$${GF_URL}/api/datasources" \
            -d "$${PAYLOAD}" > /dev/null
        fi
    restart: "no"

volumes:
  grafana-data:
